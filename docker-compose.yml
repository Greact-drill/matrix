services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    container_name: continuwuity
    restart: unless-stopped
    volumes:
      - ./config.toml:/etc/conduwuit/conduwuit.toml:ro
      - continuwuity_data:/var/lib/conduwuit:rw
    networks:
      - proxy

volumes:
  continuwuity_data:

networks:
  proxy:
    external: true
